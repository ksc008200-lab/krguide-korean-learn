<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>비밀번호 재설정 | KR Guide</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:#f3f4f6;min-height:100vh;display:flex;flex-direction:column}
header{background:#fff;border-bottom:1px solid #e5e7eb;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:1.4rem;font-weight:800;color:#1a56db;text-decoration:none;letter-spacing:-0.5px}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem}
.card{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);padding:2.5rem;width:100%;max-width:420px}
h1{font-size:1.75rem;font-weight:700;color:#111827;margin-bottom:.375rem}
.sub{color:#6b7280;margin-bottom:2rem;font-size:.95rem;line-height:1.6}
.form-group{margin-bottom:1.25rem}
label{display:block;font-size:.875rem;font-weight:600;color:#374151;margin-bottom:.375rem}
input{width:100%;padding:.75rem 1rem;border:1.5px solid #d1d5db;border-radius:8px;font-size:1rem;transition:border-color .2s}
input:focus{outline:none;border-color:#1a56db;box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.btn{width:100%;padding:.875rem;background:#1a56db;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s;margin-top:.5rem}
.btn:hover{background:#1e429f}
.btn:disabled{background:#9ca3af;cursor:not-allowed}
.msg{border-radius:8px;padding:.75rem 1rem;margin-bottom:1rem;font-size:.875rem;display:none}
.error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.success{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.icon{font-size:3rem;text-align:center;margin-bottom:1rem}
.invalid{text-align:center;padding:2rem 0}
.invalid p{color:#6b7280;margin:.5rem 0 1.5rem}
.btn-outline{display:inline-block;padding:.75rem 2rem;border:2px solid #1a56db;color:#1a56db;border-radius:8px;text-decoration:none;font-weight:600;font-size:.95rem}
footer{text-align:center;padding:1.25rem;color:#9ca3af;font-size:.8rem;border-top:1px solid #f3f4f6}
</style>
</head>
<body>
<header>
  <a href="/" class="logo">KR Guide</a>
</header>
<main>
  <div class="card">
    <div id="loading" style="text-align:center;padding:2rem;color:#6b7280">링크 확인 중...</div>

    <div id="invalid" class="invalid" style="display:none">
      <div class="icon">⚠️</div>
      <h1>링크가 만료되었습니다</h1>
      <p>비밀번호 재설정 링크는 1시간 동안만 유효합니다.<br>다시 요청해주세요.</p>
      <a href="/forgot-password/" class="btn-outline">다시 요청하기</a>
    </div>

    <div id="formWrap" style="display:none">
      <div class="icon">🔑</div>
      <h1>새 비밀번호 설정</h1>
      <p class="sub">새로운 비밀번호를 입력해주세요.</p>
      <div class="msg error" id="err"></div>
      <div class="msg success" id="ok"></div>
      <form id="form">
        <div class="form-group">
          <label for="pw">새 비밀번호</label>
          <input type="password" id="pw" placeholder="8자 이상 입력" required minlength="8" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="pw2">새 비밀번호 확인</label>
          <input type="password" id="pw2" placeholder="비밀번호 재입력" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn" id="btn">비밀번호 변경</button>
      </form>
    </div>
  </div>
</main>
<footer>© 2024 KR Guide · <a href="/privacy-policy/" style="color:#9ca3af">개인정보처리방침</a></footer>
<script>
const AUTH='https://auth.krguide.com';
const token=new URLSearchParams(location.search).get('token');

if(!token){
  document.getElementById('loading').style.display='none';
  document.getElementById('invalid').style.display='block';
}else{
  document.getElementById('loading').style.display='none';
  document.getElementById('formWrap').style.display='block';
}

document.getElementById('form').addEventListener('submit',async e=>{
  e.preventDefault();
  const btn=document.getElementById('btn'),err=document.getElementById('err'),ok=document.getElementById('ok');
  err.style.display='none';ok.style.display='none';
  const pw=document.getElementById('pw').value,pw2=document.getElementById('pw2').value;
  if(pw!==pw2){err.textContent='비밀번호가 일치하지 않습니다.';err.style.display='block';return;}
  btn.disabled=true;btn.textContent='변경 중...';
  try{
    const r=await fetch(`${AUTH}/auth/reset-password`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token,password:pw})});
    const d=await r.json();
    if(r.ok){
      ok.textContent='비밀번호가 변경되었습니다! 잠시 후 로그인 페이지로 이동합니다...';
      ok.style.display='block';document.getElementById('form').style.display='none';
      setTimeout(()=>location.href='/login/',2500);
    }else{
      if(r.status===400&&d.error&&d.error.includes('만료')){
        document.getElementById('formWrap').style.display='none';
        document.getElementById('invalid').style.display='block';
      }else{err.textContent=d.error||'비밀번호 변경에 실패했습니다.';err.style.display='block';btn.disabled=false;btn.textContent='비밀번호 변경';}
    }
  }catch{err.textContent='서버 연결에 실패했습니다. 잠시 후 다시 시도해주세요.';err.style.display='block';btn.disabled=false;btn.textContent='비밀번호 변경';}
});
</script>
</body>
</html>
