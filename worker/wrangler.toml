name = "krguide-auto-post"
main = "worker.js"
compatibility_date = "2024-01-01"

# 하루 1회 자동 포스팅: 오전 8시 KST (23:00 UTC)
[triggers]
crons = ["0 23 * * *"]

[[kv_namespaces]]
binding = "ANALYTICS"
id = "74397da40d3f4386b6d15fc4ffb7357a"

# 환경변수는 Cloudflare Dashboard에서 Secret으로 설정:
# ANTHROPIC_API_KEY
# WP_APP_PASSWORD
# WP_USERNAME
# WP_URL

# ── Auth Worker ──────────────────────────────────────────────────────────────
[[workers]]
name = "krguide-auth"
main = "auth-worker.js"
compatibility_date = "2024-01-01"

[[workers.r2_buckets]]
binding = "MEMBERS_BUCKET"
bucket_name = "krguide-members"

[[workers.kv_namespaces]]
binding = "SESSIONS"
id = "a973b3f5cc5a429ca7210e205027f376"

[[workers.kv_namespaces]]
binding = "EMAIL_INDEX"
id = "5021e028c4134fe1a902f873e37e9624"

[[workers.kv_namespaces]]
binding = "RESET_TOKENS"
id = "5686ceb20f364ad292db09ee3dd1489d"

# 환경변수 (Dashboard에서 Secret으로 설정):
# ADMIN_KEY  — 관리자 전용 API 키
